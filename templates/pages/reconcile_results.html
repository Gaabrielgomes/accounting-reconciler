<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <main class="p-8">

        <div class="bg-white rounded-2xl shadow-lg p-6">

            <h2 class="text-2xl font-bold mb-6 text-gray-800">
                Resultado da Conciliação
            </h2>

            <div class="overflow-x-auto">
                <table class="min-w-full border border-gray-200 rounded-lg overflow-hidden">
                    <thead class="bg-gray-200">
                        <tr>
                            <th class="px-4 py-2 text-left text-sm font-semibold text-gray-700">Nome</th>
                            <th class="px-4 py-2 text-left text-sm font-semibold text-gray-700">Documento</th>
                            <th class="px-4 py-2 text-left text-sm font-semibold text-gray-700">Status</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">

                        {% for row in results %}
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-2 text-sm text-gray-700">{{ row.name }}</td>
                            <td class="px-4 py-2 text-sm text-gray-700">{{ row.document }}</td>
                            <td class="px-4 py-2 text-sm font-semibold 
                                {% if row.status == 'OK' %}
                                    text-green-600
                                {% else %}
                                    text-red-600
                                {% endif %}
                            ">
                                {{ row.status }}
                            </td>
                        </tr>
                        {% endfor %}

                    </tbody>
                </table>
            </div>

        </div>

    </main>

</body>
</html>
