<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Process</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">

    <main class="flex flex-1 items-center justify-center">

        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">
                Upload CSV
            </h2>

            <form method="post" enctype="multipart/form-data" class="space-y-4">
                {% csrf_token %}

                <div>
                    <label class="block mb-2 font-medium text-gray-700">
                        CSV file
                    </label>
                    <input type="file"
                           name="file"
                           accept=".csv"
                           class="block w-full text-sm text-gray-700
                                  file:mr-4 file:py-2 file:px-4
                                  file:rounded-lg file:border-0
                                  file:text-sm file:font-semibold
                                  file:bg-blue-600 file:text-white
                                  hover:file:bg-blue-700"/>
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 transition text-white py-2 rounded-lg font-semibold">
                    Process
                </button>
            </form>

            <div class="flex justify-center mt-1">
                <a href="{% url 'reconcile:filter_by_period' %}"
                   class="text-gray-500 hover:text-gray-700 py-2 rounded-sm text-sm font-semibold transition">
                    Skip
                </a>
            </div>

        </div>

    </main>

</body>
</html>
