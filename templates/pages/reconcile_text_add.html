{% extends 'base.html' %}

{% block title %}Text Add{% endblock %}

{% block content %}
<h1>Upload de Arquivo TXT</h1>

<form method="post" enctype="multipart/form-data" class="form-box">
    {% csrf_token %}

    <div class="form-group">
        {{ form.file.label_tag }}
        {{ form.file }}
    </div>

    <button type="submit" class="submit-btn">
        Enviar
    </button>
</form>

{% endblock %}
