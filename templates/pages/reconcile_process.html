<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reconciliation Process</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-10">

    <div class="max-w-4xl mx-auto">

        <h1 class="text-3xl font-semibold mb-8 text-gray-800">
            Processing Reconciliation
        </h1>

        <div id="progress-container" class="space-y-6"></div>

        <div id="error-message" class="text-red-600 mt-6"></div>

    </div>

    <script>

        function createProgressBox(companyId) {

            const container = document.getElementById("progress-container");

            const wrapper = document.createElement("div");
            wrapper.className = "bg-white p-6 rounded-2xl shadow-md";
            wrapper.id = "box-" + companyId;

            wrapper.innerHTML = `
                <div class="flex justify-between items-center mb-3">
                    <span class="font-medium text-gray-700">
                        Company ${companyId}
                    </span>
                    <span id="percent-${companyId}" 
                          class="font-semibold text-gray-700">
                        0%
                    </span>
                </div>

                <div class="w-full bg-gray-200 rounded-full h-4">
                    <div id="bar-${companyId}" 
                         class="h-4 rounded-full bg-blue-500 transition-all duration-500"
                         style="width: 0%">
                    </div>
                </div>
            `;

            container.appendChild(wrapper);
        }

        function updateProgress(companyId, percent) {

            let bar = document.getElementById("bar-" + companyId);
            let percentLabel = document.getElementById("percent-" + companyId);

            if (!bar || !percentLabel) {
                createProgressBox(companyId);
                return updateProgress(companyId, percent);
            }

            bar.style.width = percent + "%";
            percentLabel.innerText = percent + "%";

            if (percent === 100) {
                bar.classList.remove("bg-blue-500");
                bar.classList.add("bg-green-500");

                percentLabel.innerHTML = percent + "% <span class='text-green-600 ml-2'>✔</span>";
            }
        }

        function fetchProgress() {

            fetch("/reconcile/main/")
                .then(response => response.json())
                .then(data => {

                    if (data.error) {
                        document.getElementById("error-message").innerText = data.error;
                        return;
                    }

                    const progress = data.progress;

                    Object.entries(progress).forEach(([companyId, percent]) => {
                        updateProgress(companyId, percent);
                    });

                    if (data.status !== "finished") {
                        setTimeout(fetchProgress, 2000);
                    }

                })
                .catch(() => {
                    document.getElementById("error-message").innerText = 
                        "Error while processing file.";
                });
        }

        fetchProgress();

    </script>

</body>
</html>
